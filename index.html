<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEK — Inner World</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid-pattern"></div>

  <div class="main-wrapper">
    <div class="app-interface">
      
      <div class="noise-overlay"></div>
      
      <header class="profile-header">
        <div class="avatar-container">
          <div class="inner-circle"></div>
          <span class="pulse-dot"></span>
        </div>
        <div class="intro-text">
          <h1 id="site-title" class="glitch-title">//</h1>
          <p id="site-subtitle" class="sub-thoughts">//</p>
        </div>
      </header>

      <section class="focus-card">
        <div class="track-image-container">
          <div class="track-image"></div>
        </div>
        <div class="track-details">
          <span id="card-tag" class="inner-tag">//</span>
          <h2 id="card-text">//</h2>
          <a id="card-link" href="#" target="_blank" class="liquid-btn">ENTER CORE</a>
        </div>
      </section>

      <main class="navigation-links">
        <a id="nav-link-1" href="#" target="_blank" class="nav-row">
          <span id="nav-label-1" class="nav-label">//</span>
          <span class="nav-slashes">//</span>
        </a>

        <a id="nav-link-2" href="#" target="_blank" class="nav-row">
          <span id="nav-label-2" class="nav-label">//</span>
          <span class="nav-slashes">//</span>
        </a>

        <div class="inner-thoughts-box">
          <div class="info-header">
            <span class="terminal-dash"><span id="diary-title">//</span><span class="blinking-cursor">_</span></span>
          </div>
          <p id="diary-text" class="quote">//</p>
        </div>
      </main>

      <footer class="app-version">
        <p id="site-version">//</p>
      </footer>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
